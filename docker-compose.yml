services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: en_learner
      POSTGRES_USER: en_learner
      POSTGRES_PASSWORD: en_learner
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U en_learner -d en_learner"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      BACKEND_HOST: 0.0.0.0
      BACKEND_PORT: 3001
      DATABASE_URL: postgres://en_learner:en_learner@postgres:5432/en_learner
      PUBLIC_BACKEND_URL: http://localhost:3001
    ports:
      - "3001:3001"

volumes:
  postgres_data:
